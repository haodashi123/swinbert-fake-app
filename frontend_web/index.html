<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>基于多模态融合的假新闻智能检测系统</title>
    <style>
      body { margin: 0; background: #f8fbff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      
      .app-loading-screen {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 251, 255, 0.9) 100%);
        color: #1260a3;
        transition: opacity 0.6s ease-out;
      }
      
      .app-logo-wrap {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .app-logo-svg {
        width: 48px;
        height: 48px;
        color: #1260a3;
        z-index: 2;
        animation: app-pulse 2s ease-in-out infinite;
      }

      .app-loading-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid rgba(18, 96, 163, 0.08);
        border-top-color: #1260a3;
        animation: app-spin 1s linear infinite;
        z-index: 1;
      }

      .app-loading-text {
        margin-top: 24px;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: #64748b;
        animation: app-fade 1.5s ease-in-out infinite alternate;
      }

      @keyframes app-spin { to { transform: rotate(360deg); } }
      @keyframes app-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.92); opacity: 0.85; } }
      @keyframes app-fade { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-loading" class="app-loading-screen">
      <div class="app-logo-wrap">
        <div class="app-loading-ring"></div>
        <svg class="app-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M32 5 52 13v17c0 14.1-8.2 26.2-20 31-11.8-4.8-20-16.9-20-31V13L32 5Z" stroke-width="3.4"/>
          <path d="M24.5 32.8 30 38.3 40 28.3" stroke-width="3.1"/>
          <path d="M32 12 44.8 17.4v12.1c0 8.8-4.9 16.4-12.8 20.5-7.9-4.1-12.8-11.7-12.8-20.5V17.4L32 12Z" stroke-width="2.2" opacity="0.35"/>
        </svg>
      </div>
      <div class="app-loading-text">Loading System...</div>
    </div>
    <script>
      window.addEventListener('load', () => {
        // Force minimum display time of 1.5s
        setTimeout(() => {
          const loader = document.getElementById('app-loading');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 600);
          }
        }, 1500);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
